# MCP Servers Hub - Docker Compose Configuration
# This file orchestrates all MCP servers in the hub

services:
  # Notion Idea Server
  notion-idea-server:
    build:
      context: ./notion-idea-server
      dockerfile: Dockerfile
      target: production
    container_name: mcp-notion-idea-server
    restart: unless-stopped
    
    environment:
      - NODE_ENV=production
      - SERVER_NAME=notion-idea-server
      - SERVER_VERSION=1.0.0
    
    env_file:
      - ./notion-idea-server/.env
    
    # Resource limits
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 128M
          cpus: '0.1'
    
    # Health check disabled for MCP servers (they communicate via stdio)
    # healthcheck:
    #   test: ["CMD", "node", "-e", "console.log('Notion server healthy')"]
    #   interval: 30s
    #   timeout: 10s
    #   retries: 3
    #   start_period: 10s
    
    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    
    # Networks
    networks:
      - mcp-network
    
    # Labels for service discovery
    labels:
      - "mcp.server=notion-idea-server"
      - "mcp.type=notion"
      - "mcp.version=1.0.0"

  # Notion HTTP API — used by the orchestrator for Notion read/write
  notion-idea-server-http:
    build:
      context: ./notion-idea-server
      dockerfile: Dockerfile
      target: production
    container_name: mcp-notion-idea-server-http
    restart: unless-stopped
    
    environment:
      - NODE_ENV=production
      - SERVER_NAME=notion-idea-server-http
      - SERVER_VERSION=1.0.0
    
    env_file:
      - ./notion-idea-server/.env
    
    # Expose HTTP port for orchestrator access
    ports:
      - "3001:3001"
    
    # Resource limits
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 128M
          cpus: '0.1'
    
    # Override command to run HTTP wrapper
    command: ["node", "dist/http-wrapper.js"]
    
    # Networks
    networks:
      - mcp-network
    
    # Labels for service discovery
    labels:
      - "mcp.server=notion-idea-server-http"
      - "mcp.type=notion"
      - "mcp.mode=http"
      - "mcp.version=1.0.0"

  # Development versions (using profiles)
  notion-idea-server-dev:
    build:
      context: ./notion-idea-server
      dockerfile: Dockerfile
      target: builder
    container_name: mcp-notion-idea-server-dev
    restart: unless-stopped
    
    environment:
      - NODE_ENV=development
      - SERVER_NAME=notion-idea-server-dev
    
    env_file:
      - ./notion-idea-server/.env
    
    volumes:
      - ./notion-idea-server/src:/app/src:ro
      - ./notion-idea-server/package.json:/app/package.json:ro
      - ./notion-idea-server/tsconfig.json:/app/tsconfig.json:ro
    
    command: ["npm", "run", "dev"]
    
    networks:
      - mcp-network
    
    labels:
      - "mcp.server=notion-idea-server-dev"
      - "mcp.type=notion"
      - "mcp.environment=development"
    
    profiles:
      - dev

  # Development HTTP wrapper with hot reload
  notion-idea-server-http-dev:
    build:
      context: ./notion-idea-server
      dockerfile: Dockerfile
      target: builder
    container_name: mcp-notion-idea-server-http-dev
    restart: unless-stopped
    
    environment:
      - NODE_ENV=development
      - SERVER_NAME=notion-idea-server-http-dev
    
    env_file:
      - ./notion-idea-server/.env
    
    # Expose HTTP port for development testing
    ports:
      - "3001:3001"
    
    volumes:
      - ./notion-idea-server/src:/app/src:ro
      - ./notion-idea-server/package.json:/app/package.json:ro
      - ./notion-idea-server/tsconfig.json:/app/tsconfig.json:ro
    
    # Run HTTP wrapper in development mode with hot reload
    command: ["npm", "run", "http-dev"]
    
    networks:
      - mcp-network
    
    labels:
      - "mcp.server=notion-idea-server-http-dev"
      - "mcp.type=notion"
      - "mcp.mode=http"
      - "mcp.environment=development"
    
    profiles:
      - dev

  # Director MCP Server - Orchestrates multi-agent workflows
  director-mcp-server:
    build:
      context: ./director-mcp-server
      dockerfile: Dockerfile
      target: production
    container_name: mcp-director-server
    restart: unless-stopped
    
    environment:
      - NODE_ENV=production
      - SERVER_NAME=director-mcp-server
      - SERVER_VERSION=1.0.0
      - LOG_LEVEL=info
    
    # Note: No port exposure needed - MCP uses stdio transport
    
    # Mount template and schema files
    volumes:
      - ./director-mcp:/app/director-mcp:ro
      - ./docs:/app/docs:ro
      - director_logs:/app/logs
    
    # Resource limits
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 256M
          cpus: '0.2'
    
    # Networks
    networks:
      - mcp-network
    
    # Note: No health check needed - MCP server communicates via stdio
    
    # Labels for service discovery
    labels:
      - "mcp.server=director-mcp-server"
      - "mcp.type=director"
      - "mcp.mode=stdio"
      - "mcp.version=1.0.0"
      - "service=workflow-orchestration"
    
    # Dependencies
    depends_on:
      - notion-idea-server-http

  # Director MCP Server - Development Mode
  director-mcp-server-dev:
    build:
      context: ./director-mcp-server
      dockerfile: Dockerfile
      target: builder
    container_name: mcp-director-server-dev
    restart: unless-stopped
    
    environment:
      - NODE_ENV=development
      - SERVER_NAME=director-mcp-server-dev
      - LOG_LEVEL=debug
    
    # Note: No port exposure needed - MCP uses stdio transport
    
    # Mount source for development
    volumes:
      - ./director-mcp-server/src:/app/src:ro
      - ./director-mcp-server/package.json:/app/package.json:ro
      - ./director-mcp-server/tsconfig.json:/app/tsconfig.json:ro
      - ./director-mcp:/app/director-mcp:ro
      - ./docs:/app/docs:ro
      - director_logs_dev:/app/logs
    
    # Override command for development
    command: ["npm", "run", "dev"]
    
    networks:
      - mcp-network
    
    labels:
      - "mcp.server=director-mcp-server-dev"
      - "mcp.type=director"
      - "mcp.mode=stdio"
      - "mcp.environment=development"
    
    depends_on:
      - notion-idea-server-http-dev
    
    profiles:
      - dev

  # Template for future MCP servers
  # Copy and modify this template when adding new servers
  # 
  # example-server:
  #   build:
  #     context: ./example-server
  #     dockerfile: Dockerfile
  #   container_name: mcp-example-server
  #   restart: unless-stopped
  #   
  #   environment:
  #     - NODE_ENV=production
  #     - SERVER_NAME=example-server
  #   
  #   env_file:
  #     - ./example-server/.env
  #   
  #   networks:
  #     - mcp-network
  #   
  #   labels:
  #     - "mcp.server=example-server"
  #     - "mcp.type=example"

  # Orchestrator — TypeScript multi-agent pipeline runner (replaces n8n workflows)
  orchestrator:
    build:
      context: ./orchestrator
      dockerfile: Dockerfile
      target: production
    container_name: orchestrator
    restart: unless-stopped

    environment:
      - NODE_ENV=production
      - NOTION_API_URL=http://notion-idea-server-http:3001
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_USER=orchestrator
      - MYSQL_PASSWORD=orchestrator
      - MYSQL_DATABASE=orchestrator

    env_file:
      - ./orchestrator/.env

    depends_on:
      mysql:
        condition: service_healthy
      notion-idea-server-http:
        condition: service_started

    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 128M
          cpus: '0.1'

    networks:
      - mcp-network

    labels:
      - "app=orchestrator"
      - "service=pipeline-runner"

  # MySQL — workflow history and audit log for the orchestrator
  mysql:
    image: mysql:8.0
    container_name: orchestrator-mysql
    restart: unless-stopped

    environment:
      - MYSQL_ROOT_PASSWORD=rootpassword
      - MYSQL_DATABASE=orchestrator
      - MYSQL_USER=orchestrator
      - MYSQL_PASSWORD=orchestrator

    ports:
      - "3306:3306"

    volumes:
      - mysql_data:/var/lib/mysql
      # Schema is auto-loaded on first container startup
      - ./orchestrator/src/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro

    networks:
      - mcp-network

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "orchestrator", "-porchestrator"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.1'

    labels:
      - "app=orchestrator-mysql"
      - "service=database"

# Shared network for all MCP servers
networks:
  mcp-network:
    external: true
    name: mcp-servers-network

# Shared volumes (if needed for future servers)
volumes:
  mcp-shared-data:
    driver: local
  director_logs:
    driver: local
  director_logs_dev:
    driver: local
  mysql_data:
    driver: local