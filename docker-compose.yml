# MCP Server Hub - Docker Compose
# Services: notion-idea-server-http (port 3001), orchestrator, mysql

services:
  # Notion HTTP API — used by the orchestrator for Notion read/write
  notion-idea-server-http:
    build:
      context: ./notion-idea-server
      dockerfile: Dockerfile
      target: production
    container_name: mcp-notion-idea-server-http
    restart: unless-stopped

    environment:
      - NODE_ENV=production
      - SERVER_NAME=notion-idea-server-http
      - SERVER_VERSION=1.0.0

    env_file:
      - ./notion-idea-server/.env

    ports:
      - "3001:3001"

    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 128M
          cpus: '0.1'

    command: ["node", "dist/http-wrapper.js"]

    networks:
      - mcp-network

    labels:
      - "mcp.server=notion-idea-server-http"
      - "mcp.type=notion"
      - "mcp.mode=http"
      - "mcp.version=1.0.0"

  # Orchestrator — TypeScript multi-agent pipeline runner
  orchestrator:
    build:
      context: ./orchestrator
      dockerfile: Dockerfile
      target: production
    container_name: orchestrator
    restart: unless-stopped

    environment:
      - NODE_ENV=production
      - NOTION_API_URL=http://notion-idea-server-http:3001
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_USER=orchestrator
      - MYSQL_PASSWORD=orchestrator
      - MYSQL_DATABASE=orchestrator

    env_file:
      - ./orchestrator/.env

    depends_on:
      mysql:
        condition: service_healthy
      notion-idea-server-http:
        condition: service_started

    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 128M
          cpus: '0.1'

    networks:
      - mcp-network

    labels:
      - "app=orchestrator"
      - "service=pipeline-runner"

  # MySQL — workflow history and audit log for the orchestrator
  mysql:
    image: mysql:8.0
    container_name: orchestrator-mysql
    restart: unless-stopped

    environment:
      - MYSQL_ROOT_PASSWORD=rootpassword
      - MYSQL_DATABASE=orchestrator
      - MYSQL_USER=orchestrator
      - MYSQL_PASSWORD=orchestrator

    ports:
      - "3306:3306"

    volumes:
      - mysql_data:/var/lib/mysql
      # Schema is auto-loaded on first container startup
      - ./orchestrator/src/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro

    networks:
      - mcp-network

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "orchestrator", "-porchestrator"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.1'

    labels:
      - "app=orchestrator-mysql"
      - "service=database"

networks:
  mcp-network:
    external: true
    name: mcp-servers-network

volumes:
  mysql_data:
    driver: local
